{% extends 'base.html' %}
{% block title %}Sign Up – MaisonLiban{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">MAISONLIBAN</div>
    <h2 class="auth-title">Create account</h2>
    <p class="auth-sub">Join MaisonLiban today</p>
    <form action="{{ url_for('auth.signup') }}" method="POST" class="auth-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Your full name" required>
      </div>
      <div class="form-group">
        <label>Email address</label>
        <input type="email" name="email" placeholder="you@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Min. 6 characters" required>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" placeholder="Repeat password" required>
      </div>
      <button type="submit" class="btn-primary" style="width:100%">Create Account</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
  </div>
</div>
{% endblock %}
