{% extends 'base.html' %}
{% block title %}Sign In – MaisonLiban{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">MAISONLIBAN</div>
    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-sub">Sign in to your account</p>
    <form action="{{ url_for('auth.login') }}" method="POST" class="auth-form">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" name="email" placeholder="you@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn-primary" style="width:100%">Sign In</button>
    </form>
    <p class="auth-footer">Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign up</a></p>
  </div>
</div>
{% endblock %}
